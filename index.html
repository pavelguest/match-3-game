<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Три в ряд</title>
  </head>
  <body>
    <div class="game">
      <div class="info">
        <p class="score">Очки: <span id="score">0</span></p>
        <button id="restart">Новая игра</button>
      </div>
      <div class="timer-container">
        <div id="timer-fill" class="timer-fill"></div>
      </div>
      <div id="board" class="board"></div>
    </div>
    <div id="gameover" class="gameover hidden">
      <div class="gameover-box">
        <h2>Игра окончена</h2>
        <p id="gameover-reason">Время истекло</p>
        <p class="final-score">Ваш счёт: <span id="final-score">0</span></p>
        <button id="gameover-restart">Играть снова</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
